services:
  lokal:
    image: ghcr.io/didair/lokal:latest
    pull_policy: always
    container_name: lokal
    hostname: lokal
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/mydb
      - DATA_DIR=/data
      # Set this when Lokal is served behind a domain/proxy so generated links use the public HTTPS URL.
      # Example: LOKAL_PUBLIC_URL=https://files.skurt.cloud
      - LOKAL_PUBLIC_URL=
      - RUN_MIGRATIONS=true
    volumes:
      - /path/to/data:/data
    depends_on:
      - db

  db:
    image: postgres:13
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mydb
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
