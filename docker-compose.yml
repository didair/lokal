services:
  lokal:
    # Build locally so the image matches the NAS CPU architecture.
    # The previously published didair/lokal:latest image may not include linux/amd64.
    build:
      context: .
      dockerfile: scripts/Dockerfile
    image: lokal:latest
    container_name: lokal
    hostname: lokal
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/mydb
      - DATA_DIR=/data
      - RUN_MIGRATIONS=true
    volumes:
      - /path/to/data:/data
    depends_on:
      - db

  db:
    image: postgres:13
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mydb
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
