services:
  web:
    container_name: lokal-web
    build:
      context: .
      dockerfile: scripts/Dockerfile.dev
    command: ["npm", "run", "dev:docker"]
    expose:
      - "3333"
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/mydb
      - DATA_DIR=/data
      - RUN_MIGRATIONS=true
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - .:/lokal
      - lokal_node_modules:/lokal/node_modules
      - ./test_data/:/data
    depends_on:
      - db
    networks:
      - default
      - local-proxy

  db:
    image: postgres:13
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mydb
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:4.23
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@pgadmin.com
      PGADMIN_DEFAULT_PASSWORD: password
      PGADMIN_LISTEN_PORT: 80
    ports:
      - 3001:80
    volumes:
      - pgadmin:/var/lib/pgadmin
    depends_on:
      - db

volumes:
  postgres_data:
  pgadmin:
  lokal_node_modules:

networks:
  local-proxy:
    external: true
